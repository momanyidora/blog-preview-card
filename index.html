<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <article class="card">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Article Illustration"
          class="card-image"
        />
        <p class="card-tag">Learning</p>

        <p class="card-date">Published 21 Dec 2023</p>

        <h1 class="card-title">HTML & CSS foundations</h1>

        <p class="card-description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

        <div class="card-author">
          <img src="./assets/images/image-avatar.webp" alt="Greg Hooper" />
          <span><strong> Hooper</strong></span>
        </div>
      </article>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Dorah</a>.
    </footer>
  </body>
</html>
